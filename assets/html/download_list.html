<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قائمة التحميل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6D256F; --secondary: #1EBAA6; --white: #FFFFFF; --light-bg: #F8F9FA; --dark-text: #2D3748; --card-shadow: 0 20px 40px rgba(109, 37, 111, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--light-bg); color: var(--dark-text); min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; gap: 20px; }
        .back-btn { background: linear-gradient(135deg, #6D256F, #8D2E8F); border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; cursor: pointer; }
        .page-title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #6D256F, #8D2E8F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .empty-state { text-align: center; padding: 60px 30px; background: white; border-radius: 25px; box-shadow: var(--card-shadow); }
        .empty-icon { font-size: 60px; color: var(--primary); opacity: 0.5; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-right"></i></button>
            <h1 class="page-title">قائمة التحميل</h1>
        </div>
        <div id="videosContainer">
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-download"></i></div>
                <h3>لا توجد فيديوهات في القائمة</h3>
                <p>اضغط على زر التحميل من المشغل لإضافة فيديو</p>
            </div>
        </div>
    </div>
    <script>
        function goBack() {
            if (typeof Android !== 'undefined' && Android.goBack) { Android.goBack(); }
            else if (typeof AndroidBridge !== 'undefined' && AndroidBridge.goBack) { AndroidBridge.goBack(); }
            else { window.history.back(); }
        }
    </script>
</body>
</html>
