            --accent: #FF6B9D;
            --white: #FFFFFF;
            --light-bg: #F8F9FA;
            --dark-text: #2D3748;
            --light-text: #666;
            --card-shadow: 0 20px 40px rgba(109, 37, 111, 0.15);

        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            background: var(--light-bg); color: var(--dark-text); min-height: 100vh; overflow-x: hidden;
        }
        .background-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; opacity: 0.6; }
        .floating-shapes { position: absolute; width: 100%; height: 100%; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.08; animation: float 25s infinite ease-in-out; filter: blur(15px); }
        .shape-1 { width: 250px; height: 250px; background: var(--primary); top: 5%; left: 5%; }
        .shape-2 { width: 180px; height: 180px; background: var(--secondary); top: 65%; right: 10%; animation-delay: 8s; }
        .shape-3 { width: 120px; height: 120px; background: var(--accent); bottom: 15%; left: 15%; animation-delay: 16s; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg) scale(1); } 33% { transform: translateY(-20px) rotate(5deg) scale(1.05); } 66% { transform: translateY(10px) rotate(-5deg) scale(0.95); } }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 55px; height: 55px; background: var(--primary-gradient); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; box-shadow: var(--card-shadow); }
        .logo-text { font-size: 24px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { width: 50px; height: 50px; border-radius: 14px; background: white; border: none; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 22px; box-shadow: var(--card-shadow); cursor: pointer; transition: var(--transition); }
        .back-btn:hover { background: var(--secondary); color: white; transform: translateY(-3px); box-shadow: var(--hover-shadow); }
        .hero { text-align: center; padding: 30px 0 20px; }
        .hero-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 1.1rem; color: var(--light-text); max-width: 600px; margin: 0 auto 30px; line-height: 1.6; }
        .section-tabs { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .section-tab { background: white; border: none; padding: 15px 25px; border-radius: 15px; color: var(--light-text); font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; box-shadow: var(--card-shadow); }
        .section-tab.active { color: var(--primary); transform: translateY(-5px); box-shadow: var(--hover-shadow); }
        .section-tab.literary.active { color: var(--secondary); }
        .vocabulary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .vocab-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: var(--card-shadow); transition: var(--transition); border: 2px solid transparent; cursor: pointer; }
        .vocab-card:hover { transform: translateY(-10px); box-shadow: var(--hover-shadow); border-color: rgba(109, 37, 111, 0.2); }
        .vocab-icon { width: 100%; height: 120px; background: linear-gradient(135deg, rgba(109, 37, 111, 0.05) 0%, rgba(30, 186, 166, 0.05) 100%); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 50px; }
        .vocab-info { padding: 20px; }
        .vocab-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--dark-text); }
        .vocab-description { color: var(--light-text); line-height: 1.6; margin-bottom: 20px; font-size: 14px; }
        .study-btn { display: block; width: 100%; padding: 12px; background: var(--secondary-gradient); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); text-align: center; }
        .study-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(30, 186, 166, 0.4); }
        .detail-page { display: none; padding: 20px 0; }
        .detail-content { max-width: 800px; margin: 0 auto; background: white; border-radius: 18px; overflow: hidden; box-shadow: var(--card-shadow); }
        .audio-player { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); }
        .audio-player audio { width: 100%; height: 50px; }
        audio::-webkit-media-controls-download-button { display: none !important; }
        .detail-actions { padding: 20px; display: flex; gap: 15px; }
        .detail-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .test-btn { background: var(--secondary-gradient); color: white; }
        .test-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(30, 186, 166, 0.4); }
        .back-detail-btn { background: white; color: var(--dark-text); box-shadow: var(--card-shadow); }
        .back-detail-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); }
        .image-container { width: 100%; height: 70vh; border: 3px solid rgba(0,0,0,0.1); border-radius: 15px; background-color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; overflow: hidden; margin-bottom: 20px; }
        .image-zoomer { width: 100%; height: 100%; position: relative; touch-action: none; }
        .zoomable-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transition: transform 0.1s ease; transform-origin: 0 0; will-change: transform; user-select: none; -webkit-user-drag: none; }
        .fade-in { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

            .hero-title { font-size: 2rem; }

            .section-tabs { flex-direction: column; align-items: center; }
            .section-tab { width: 100%; max-width: 300px; justify-content: center; }
            .detail-actions { flex-direction: column; }
            .image-container { height: 60vh; }
        }
    </style>
</head>

        let currentLesson = null;
        function goBack() {
            if (typeof Android !== 'undefined' && Android.goBack) { Android.goBack(); }
            else if (typeof AndroidBridge !== 'undefined' && AndroidBridge.goBack) { AndroidBridge.goBack(); }
            else { window.history.back(); }
        }
        function showLessonDetail(branch, lessonId) {
            const lesson = vocabularyData[branch].find(item => item.id == lessonId);
            if (lesson) {
                currentLesson = lesson;
                document.getElementById('zoomableImage').src = BASE_URL + '/images/' + lesson.fileName + '.jpg';
                document.getElementById('audioPlayer').src = BASE_URL + '/audio/' + lesson.fileName + '.mp3';
                resetImage();
                document.getElementById('selectionPage').style.display = 'none';
                document.getElementById('detailPage').style.display = 'block';
            }
        }
        function startTest() {
            if (currentLesson) {
                window.open(BASE_URL + '/test/' + currentLesson.fileName + '.html', '_blank');
            } else { alert('يرجى اختيار درس أولاً'); }
        }
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY, initialDistance = null, initialScale = 1;
        function updateTransform() { document.getElementById('zoomableImage').style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + scale + ')'; }
        function resetImage() { scale = 1; posX = 0; posY = 0; updateTransform(); }
        function getTouchDistance(t1, t2) { var dx = t1.clientX - t2.clientX; var dy = t1.clientY - t2.clientY; return Math.sqrt(dx*dx + dy*dy); }
        document.addEventListener('DOMContentLoaded', function() {
            var zoomer = document.getElementById('imageZoomer');
            if (zoomer) {
                zoomer.addEventListener('mousedown', function(e) { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; e.preventDefault(); });
                document.addEventListener('mousemove', function(e) { if (!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); });
                document.addEventListener('mouseup', function() { isDragging = false; });
                zoomer.addEventListener('wheel', function(e) { e.preventDefault(); var rect = zoomer.getBoundingClientRect(); var mouseX = e.clientX - rect.left; var mouseY = e.clientY - rect.top; var wheel = e.deltaY < 0 ? 1 : -1; var newScale = Math.max(0.1, scale + wheel * 0.1); if (newScale !== scale) { var scaleChange = newScale / scale; posX += mouseX * (1 - scaleChange); posY += mouseY * (1 - scaleChange); scale = newScale; updateTransform(); } });
                zoomer.addEventListener('touchstart', function(e) { if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; } else if (e.touches.length === 2) { isDragging = false; initialDistance = getTouchDistance(e.touches[0], e.touches[1]); initialScale = scale; } e.preventDefault(); });
                zoomer.addEventListener('touchmove', function(e) { if (e.touches.length === 1 && isDragging) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); } else if (e.touches.length === 2 && initialDistance !== null) { var currentDistance = getTouchDistance(e.touches[0], e.touches[1]); var newScale = Math.max(0.1, initialScale * (currentDistance / initialDistance)); if (newScale !== scale) { var centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2; var centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2; var rect = zoomer.getBoundingClientRect(); var offsetX = centerX - rect.left; var offsetY = centerY - rect.top; var scaleRatio = newScale / scale; posX += offsetX * (1 - scaleRatio); posY += offsetY * (1 - scaleRatio); scale = newScale; updateTransform(); } } e.preventDefault(); });
                zoomer.addEventListener('touchend', function(e) { if (e.touches.length === 0) { isDragging = false; initialDistance = null; } });
            }
            var sectionTabs = document.querySelectorAll('.section-tab');
            sectionTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    sectionTabs.forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    loadVocabulary(this.getAttribute('data-tab'));
                });
            });
            function loadVocabulary(type) {
                var container = document.getElementById('vocabularyContainer');
                container.innerHTML = '';
                if (vocabularyData[type]) {
                    vocabularyData[type].forEach(function(item) {
                        var card = document.createElement('div');
                        card.className = 'vocab-card fade-in';
                        card.innerHTML = '<div class="vocab-icon"><i class="' + item.icon + '"></i></div><div class="vocab-info"><h3 class="vocab-title">' + item.title + '</h3><p class="vocab-description">' + item.description + '</p><button class="study-btn" data-id="' + item.id + '"><i class="fas fa-play-circle"></i> ابدأ الدراسة</button></div>';
                        container.appendChild(card);
                    });
                    document.querySelectorAll('.study-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var lessonId = this.getAttribute('data-id');
                            var branch = document.querySelector('.section-tab.active').getAttribute('data-tab');
                            if (lessonId && branch) showLessonDetail(branch, lessonId);
                        });
                    });
                    setTimeout(function() { document.querySelectorAll('.fade-in').forEach(function(el) { el.classList.add('visible'); }); }, 100);
                }
            }
            function backToSelectionPage() {
                document.getElementById('detailPage').style.display = 'none';
                document.getElementById('selectionPage').style.display = 'block';
                var audio = document.getElementById('audioPlayer');
                audio.pause(); audio.currentTime = 0;
            }
            document.getElementById('backToSelection').addEventListener('click', backToSelectionPage);
            document.getElementById('backDetailBtn').addEventListener('click', backToSelectionPage);
            document.getElementById('startTestBtn').addEventListener('click', startTest);
            loadVocabulary('science');
        });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    </script>
