name: alyounes_app
description: منصة اليونسيون التعليمية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  webview_flutter: ^4.10.0
  http: ^1.2.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  device_info_plus: ^11.3.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  jni: 0.10.0
  path_provider_android: 2.2.15

flutter:
  uses-material-design: true
  
  assets:
    - assets/html/