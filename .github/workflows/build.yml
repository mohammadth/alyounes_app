name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        # زيادة مهلة التحميل وعدد المحاولات لشبكة أكثر استقراراً
        ./gradlew assembleRelease --no-daemon --max-workers=2 --refresh-dependencies \
          -Dhttp.socketTimeout=60000 \
          -Dhttp.connectionTimeout=60000 \
          -Dhttps.socketTimeout=60000 \
          -Dhttps.connectionTimeout=60000
      working-directory: ./
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: ignore